<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <!-- Concept D — Spreading Branches -->
  <!-- Abstract bur oak branching: short wide trunk, 5 main limbs, foliage clusters at ends -->

  <!-- Main trunk - short and stout like a bur oak -->
  <path d="M112 195 C110 180, 108 165, 108 150 C108 140, 110 135, 115 128 L125 128 C130 135, 132 140, 132 150 C132 165, 130 180, 128 195Z" fill="#8b7355"/>

  <!-- Root flare -->
  <path d="M108 185 C100 192, 90 197, 82 200 L100 200 L108 195Z" fill="#8b7355" opacity="0.8"/>
  <path d="M132 185 C140 192, 150 197, 158 200 L140 200 L132 195Z" fill="#8b7355" opacity="0.8"/>

  <!-- Branch 1 - far left -->
  <path d="M112 135 C100 125, 80 115, 55 95 C50 92, 42 88, 35 82" stroke="#8b7355" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M55 95 C48 90, 38 82, 28 78" stroke="#8b7355" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Foliage cluster -->
  <circle cx="30" cy="75" r="18" fill="#5c6e4e"/>
  <circle cx="18" cy="68" r="14" fill="#6b7f5a"/>
  <circle cx="38" cy="65" r="13" fill="#6b7f5a"/>
  <circle cx="25" cy="58" r="11" fill="#7a8e68"/>

  <!-- Branch 2 - left -->
  <path d="M115 130 C105 118, 90 100, 72 72" stroke="#8b7355" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M82 88 C75 78, 65 62, 58 50" stroke="#8b7355" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Foliage cluster -->
  <circle cx="68" cy="55" r="17" fill="#5c6e4e"/>
  <circle cx="55" cy="45" r="14" fill="#6b7f5a"/>
  <circle cx="75" cy="42" r="13" fill="#6b7f5a"/>
  <circle cx="62" cy="36" r="11" fill="#7a8e68"/>

  <!-- Branch 3 - center (vertical) -->
  <path d="M120 128 C120 110, 120 85, 120 55" stroke="#8b7355" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M120 70 C118 58, 115 42, 118 30" stroke="#8b7355" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Foliage cluster -->
  <circle cx="120" cy="30" r="18" fill="#5c6e4e"/>
  <circle cx="108" cy="22" r="14" fill="#6b7f5a"/>
  <circle cx="132" cy="22" r="14" fill="#6b7f5a"/>
  <circle cx="120" cy="14" r="12" fill="#7a8e68"/>

  <!-- Branch 4 - right -->
  <path d="M125 130 C135 118, 150 100, 168 72" stroke="#8b7355" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M158 88 C165 78, 175 62, 182 50" stroke="#8b7355" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Foliage cluster -->
  <circle cx="172" cy="55" r="17" fill="#5c6e4e"/>
  <circle cx="185" cy="45" r="14" fill="#6b7f5a"/>
  <circle cx="165" cy="42" r="13" fill="#6b7f5a"/>
  <circle cx="178" cy="36" r="11" fill="#7a8e68"/>

  <!-- Branch 5 - far right -->
  <path d="M128 135 C140 125, 160 115, 185 95 C190 92, 198 88, 205 82" stroke="#8b7355" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M185 95 C192 90, 202 82, 212 78" stroke="#8b7355" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Foliage cluster -->
  <circle cx="210" cy="75" r="18" fill="#5c6e4e"/>
  <circle cx="222" cy="68" r="14" fill="#6b7f5a"/>
  <circle cx="202" cy="65" r="13" fill="#6b7f5a"/>
  <circle cx="215" cy="58" r="11" fill="#7a8e68"/>

  <!-- Ground line -->
  <line x1="70" y1="200" x2="170" y2="200" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
