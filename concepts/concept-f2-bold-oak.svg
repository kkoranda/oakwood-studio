<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240">
  <!-- Concept F2 — Bold Oak -->
  <!-- Heavier, bolder version. Thicker limbs, more dramatic zigzag, denser canopy -->

  <defs>
    <radialGradient id="glow2" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#f5f0e4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fafaf9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="150" cy="100" rx="135" ry="90" fill="url(#glow2)"/>

  <!-- === DENSE CANOPY BACKDROP === -->
  <ellipse cx="150" cy="60" rx="135" ry="56" fill="#5c6e4e"/>
  <ellipse cx="50" cy="68" rx="50" ry="40" fill="#5c6e4e"/>
  <ellipse cx="250" cy="68" rx="50" ry="40" fill="#5c6e4e"/>
  <ellipse cx="150" cy="30" rx="75" ry="28" fill="#5c6e4e" opacity="0.95"/>
  <ellipse cx="80" cy="38" rx="48" ry="28" fill="#5c6e4e" opacity="0.9"/>
  <ellipse cx="220" cy="38" rx="48" ry="28" fill="#5c6e4e" opacity="0.9"/>
  <!-- Brighter top layer -->
  <ellipse cx="150" cy="52" rx="100" ry="40" fill="#6b7f5a" opacity="0.6"/>
  <ellipse cx="80" cy="48" rx="38" ry="24" fill="#6b7f5a" opacity="0.5"/>
  <ellipse cx="220" cy="48" rx="38" ry="24" fill="#6b7f5a" opacity="0.5"/>
  <ellipse cx="150" cy="25" rx="50" ry="18" fill="#7a8e68" opacity="0.4"/>

  <!-- === BRANCHES — filled polygon shapes, angular direction changes === -->

  <!-- TRUNK — very stout -->
  <polygon points="
    126,215 122,190 118,170 116,155 116,140 118,130 122,122 130,114 142,108
    158,108 170,114 178,122 182,130 184,140 184,155 182,170 178,190 174,215
  " fill="#5a4d3a"/>

  <!-- LEFT MAJOR LIMB — heavy horizontal with zigzag nodes -->
  <polygon points="
    120,128 110,118 96,110 80,106 68,98 52,94 38,86 24,82 14,76
    12,72 18,70 32,74 46,80 58,86 72,90 86,98 98,104 114,114 126,122
  " fill="#5a4d3a"/>

  <!-- Left upper branch — angular climb -->
  <polygon points="
    126,118 114,104 104,88 92,74 82,60 74,46 68,34 64,24
    60,20 64,18 70,26 78,40 86,54 96,68 108,82 118,98 130,112
  " fill="#5a4d3a"/>

  <!-- Left sub-branch off upper -->
  <polygon points="
    96,76 84,64 74,56 64,50 58,42
    56,38 62,40 72,48 82,58 94,70
  " fill="#5a4d3a"/>

  <!-- Left sub-branch off major limb -->
  <polygon points="
    68,98 58,88 48,82 38,76 30,68
    28,64 36,68 46,76 56,84 66,92
  " fill="#5a4d3a"/>

  <!-- CENTER-LEFT LIMB — goes up with angular bends -->
  <polygon points="
    134,110 130,94 126,76 122,60 118,44 114,30 112,18
    108,14 112,12 116,22 120,36 126,52 132,68 136,86 140,106
  " fill="#5a4d3a"/>

  <!-- CENTER LIMB — nearly vertical, slight zigzag -->
  <polygon points="
    143,108 142,86 140,66 142,48 144,34 146,22 148,12
    152,12 154,22 156,34 158,48 160,66 158,86 157,108
  " fill="#5a4d3a"/>

  <!-- CENTER-RIGHT LIMB -->
  <polygon points="
    160,106 164,86 168,68 174,52 180,36 184,22 188,12
    192,14 188,30 184,44 178,60 174,76 170,94 166,110
  " fill="#5a4d3a"/>

  <!-- RIGHT UPPER BRANCH — angular climb -->
  <polygon points="
    170,112 182,98 192,82 204,68 214,54 222,40 230,26 236,18
    240,20 234,34 226,46 218,60 208,74 196,88 186,104 174,118
  " fill="#5a4d3a"/>

  <!-- Right sub-branch off upper -->
  <polygon points="
    206,76 218,64 228,56 236,50 242,42
    244,38 238,40 228,48 218,58 208,70
  " fill="#5a4d3a"/>

  <!-- RIGHT MAJOR LIMB — heavy horizontal with zigzag -->
  <polygon points="
    174,122 186,114 202,104 214,98 228,90 242,86 258,80 272,74 282,70
    288,72 286,76 276,82 262,86 248,94 232,98 220,106 204,110 190,118 180,128
  " fill="#5a4d3a"/>

  <!-- Right sub-branch off major limb -->
  <polygon points="
    232,98 242,88 252,82 262,76 270,68
    272,64 264,68 254,76 244,84 234,92
  " fill="#5a4d3a"/>

  <!-- ROOT FLARE — thick spreading roots -->
  <polygon points="126,215 114,218 94,222 74,224 60,226 58,222 72,218 92,214 114,210" fill="#5a4d3a"/>
  <polygon points="174,215 186,218 206,222 226,224 240,226 242,222 228,218 208,214 186,210" fill="#5a4d3a"/>

  <!-- === FOREGROUND CANOPY — dappled light patches === -->
  <ellipse cx="40" cy="62" rx="18" ry="12" fill="#7a8e68" opacity="0.4"/>
  <ellipse cx="260" cy="62" rx="18" ry="12" fill="#7a8e68" opacity="0.4"/>
  <ellipse cx="110" cy="32" rx="16" ry="10" fill="#7a8e68" opacity="0.35"/>
  <ellipse cx="190" cy="32" rx="16" ry="10" fill="#7a8e68" opacity="0.35"/>
  <ellipse cx="150" cy="20" rx="20" ry="10" fill="#7a8e68" opacity="0.3"/>

  <!-- Ground -->
  <line x1="45" y1="228" x2="255" y2="228" stroke="#5a4d3a" stroke-width="1.2" stroke-linecap="round" opacity="0.2"/>
</svg>
